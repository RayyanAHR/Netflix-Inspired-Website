<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Home</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', 'Geneva', Verdana, sans-serif;
        }

        nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background-color: rgb(0, 0, 0);
        height: 100px;
        
        }

        .nav-left {
        display: flex;
        align-items: center;
        }

        .logo img {
        width: 100px;
        height: auto;
        cursor: pointer;
        margin-right: 30px; 
        transition: transform 0.3s ease; 
        }

        .logo img:hover {
        transform: scale(1.1);
        }

        .nav-left a {
        color: white;
        text-decoration: none;
        margin-right: 30px;
        font-size: 16px;
        transition: color 0.3s ease;
        }

        .nav-left a:hover {
        color: red;
        }

        .nav-right a {
        color: white;
        text-decoration: none;
        margin-left: 30px;
        font-size: 16px;
        transition: color 0.3s ease;
        }

        .nav-right a:hover {
        color: red;
        }

        body {
            background-color: black;
        }
        
        .content {
            padding: 20px;
        }
        .content h1 {
        color: white; 
        }
        .image-row {
            display: flex; 
            gap: 20px; 
            margin-top: 20px; 
            overflow-x: auto; 
            overflow-y: visible;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            height: 300px;
        }

        
        .image-row img {
            width: 200px; 
            height: auto; 
            border-radius: 10px; 
            transition: transform 0.3s ease;
        }
        .image-row img:hover {
            transform: scale(1.2);
        }

    </style>
</head>
<body>
    <nav>
