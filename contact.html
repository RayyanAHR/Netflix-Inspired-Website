<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="contact.css" rel="stylesheet">
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', 'Geneva', Verdana, sans-serif;
        }

        nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background-color: black;
        }

        .nav-left {
        display: flex;
        align-items: center;
        }

        .logo img {
        width: 100px;
        height: auto;
        cursor: pointer;
        margin-right: 30px; 
        transition: transform 0.3s ease; 
        }

        .logo img:hover {
        transform: scale(1.1);
        }

        .nav-left a {
        color: white;
        text-decoration: none;
        margin-right: 30px;
        font-size: 16px;
        transition: color 0.3s ease;
        }

        .nav-left a:hover {
        color: red;
        }

        .nav-right a {
        color: white;
        text-decoration: none;
        margin-left: 30px;
        font-size: 16px;
        transition: color 0.3s ease;
        }

        .nav-right a:hover {
        color: red;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
          <a href="#">
            <div class="logo">
              <img src="images/netflix.png" alt="Netflix Logo">
            </div>
          </a>  
          <a href="#">TV Shows</a>
          <a href="#">Movies</a>
          <a href="">My List</a>
          <a href="">Recently Added</a>
        </div>
    
        <div class="nav-right">
          <a href="home.html">Home</a>
          <a href="about.html">About Us</a>
          <a href="">Contact Us</a>
        </div>
    </nav>
    <main>
        <div class="content">
            <div class="form">
                <h1>Contact Us</h1>
                <h2>Tell us more and we will find the best solution for you</h2>
                <form action="">
                    <textarea name="" id="" cols="60" rows="2"></textarea>
                    <button type="submit">Submit</button>
                </form>
                <div class="quicklinks">
                    <h2>Quick Links</h2>
                    <ul>
                        <li><a href="">Reset Password</a></li>
                        <li><a href="">Update Email</a></li>
                        <li><a href="">Get Help Signing In</a></li>
                        <li><a href="">Update Payment Method</a></li>
                        <li><a href="">Request TV Shows or Movies</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </main>
    
</body>
</html>
